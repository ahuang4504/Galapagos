networks:
  dnsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  dnstap_sock:

services:
  resolver:
    build: ./resolver
    container_name: dnshield-resolver
    environment:
      - UNBOUND_CONFIG=${UNBOUND_CONFIG:-weak}
    networks:
      dnsnet:
        ipv4_address: 172.28.0.10
    volumes:
      - dnstap_sock:/var/run/unbound

  client:
    build: ./client
    container_name: dnshield-client
    depends_on:
      - resolver
    networks:
      dnsnet:
        ipv4_address: 172.28.0.20
    dns:
      - 172.28.0.10

  attacker:
    build: ./attacker
    container_name: dnshield-attacker
    depends_on:
      - resolver
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      dnsnet:
        ipv4_address: 172.28.0.30

  detector:
    build: ./detector
    container_name: dnshield-detector
    depends_on:
      - resolver
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - ENABLE_VERIFICATION=${ENABLE_VERIFICATION:-1}
      - ENABLE_CUSUM=${ENABLE_CUSUM:-0}
      - ENABLE_DNSTAP_CONFIRMATION=${ENABLE_DNSTAP_CONFIRMATION:-1}
      - SUMMARY_INTERVAL_SECONDS=${SUMMARY_INTERVAL_SECONDS:-60}
      - KAMINSKY_THRESHOLD=${KAMINSKY_THRESHOLD:-20}
      - KAMINSKY_WINDOW_SECONDS=${KAMINSKY_WINDOW_SECONDS:-30}
      - KAMINSKY_COOLDOWN_SECONDS=${KAMINSKY_COOLDOWN_SECONDS:-60}
      - WIRE_CAPTURE_INTERFACE=${WIRE_CAPTURE_INTERFACE:-eth0}
      - DNSTAP_SOCKET_PATH=${DNSTAP_SOCKET_PATH:-/var/run/unbound/dnstap.sock}
    network_mode: "service:resolver"
    volumes:
      - dnstap_sock:/var/run/unbound
