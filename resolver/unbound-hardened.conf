server:
    # Listen on all interfaces inside the container
    interface: 0.0.0.0
    port: 53

    # Allow queries from the Docker bridge subnet and loopback
    access-control: 172.28.0.0/16 allow
    access-control: 127.0.0.0/8 allow

    # ── HARDENED SETTINGS (Config B) ─────────────────────────────────────────
    # Source port is randomized by default (no outgoing-port-permit line).
    # Combined with TXID entropy: attacker must guess ~2^32 combinations.

    # Enable 0x20 case-randomization on query names for extra entropy
    use-caps-for-id: yes

    # Enforce bailiwick rules: discard out-of-zone records in responses
    harden-glue: yes

    # Validate DNSSEC signatures for signed zones
    module-config: "validator iterator"
    # trust-anchor-file is read-only (no auto-update); fine for a test environment
    trust-anchor-file: "/etc/unbound/root.key"

    # ── LOGGING ───────────────────────────────────────────────────────────────
    verbosity: 2
    log-queries: yes
    log-replies: yes
    # empty logfile = log to stderr, captured by Docker
    logfile: ""

    # ── ROOT HINTS ────────────────────────────────────────────────────────────
    root-hints: "/etc/unbound/root.hints"

    # ── PERFORMANCE ───────────────────────────────────────────────────────────
    num-threads: 1
    msg-cache-size: 4m
    rrset-cache-size: 4m
