server:
    # Listen on all interfaces inside the container
    interface: 0.0.0.0
    port: 53

    # Allow queries from the Docker bridge subnet and loopback
    access-control: 172.28.0.0/16 allow
    access-control: 127.0.0.0/8 allow

    # ── WEAK SETTINGS (Config A) ──────────────────────────────────────────────
    # Fix the outgoing source port to a single value, eliminating port entropy.
    # An attacker only needs to guess the 16-bit TXID instead of TXID + port.
    outgoing-port-permit: 5300

    # Disable 0x20 case-randomization (extra entropy that defenders use)
    use-caps-for-id: no

    # Disable bailiwick/glue hardening (allows injected out-of-zone records)
    harden-glue: no

    # Use iterator only (no DNSSEC validation)
    module-config: "iterator"

    # ── LOGGING ───────────────────────────────────────────────────────────────
    verbosity: 2
    log-queries: yes
    log-replies: yes
    # empty logfile = log to stderr, captured by Docker
    logfile: ""

    # ── ROOT HINTS ────────────────────────────────────────────────────────────
    root-hints: "/etc/unbound/root.hints"

    # ── PERFORMANCE (small values since this is a test environment) ───────────
    num-threads: 1
    msg-cache-size: 4m
    rrset-cache-size: 4m

dnstap:
    dnstap-enable: yes
    dnstap-socket-path: "/var/run/unbound/dnstap.sock"
    dnstap-send-identity: yes
    dnstap-send-version: yes
    dnstap-log-resolver-query-messages: yes
    dnstap-log-resolver-response-messages: yes
    dnstap-log-client-query-messages: yes
    dnstap-log-client-response-messages: yes
